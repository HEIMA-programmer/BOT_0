# ---- Upstream ----
upstream flask_app {
    server app:5000;
}

# ---- HTTP: ACME challenge + redirect to HTTPS ----
server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS ----
server {
    listen 443 ssl;
    server_name _;

    # SSL certificates (replace diicsu.cn with actual domain)
    ssl_certificate     /etc/letsencrypt/live/diicsu.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/diicsu.cn/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # WebSocket proxy for Socket.IO
    location /socket.io {
        proxy_pass http://flask_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # All other requests (API + SPA)
    location / {
        proxy_pass http://flask_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
