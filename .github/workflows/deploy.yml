name: Deploy

on:
  push:
    branches: [main]

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to ECS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            cd ~/BOT_0
            git pull origin main
            docker compose up -d --build
            # Reload nginx so any /nginx/conf.d/*.conf changes take effect —
            # the config is bind-mounted, so `up -d` alone won't reload it.
            docker compose exec -T nginx nginx -t && docker compose exec -T nginx nginx -s reload || true
            docker image prune -f
